name: Check Subscription Prices

on:
  schedule:
    - cron: "0 3 1,15 * *"  # bi-weekly
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install google-generativeai pyyaml || true

      - name: Run subscription check
        id: check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          output=$(python scripts/fetch_subscription_prices.py)
          echo "$output"
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for fingerprint changes
        id: diff
        run: |
          git diff --quiet data/subscriptions_fingerprints.json \
            && echo "fingerprints_changed=false" >> $GITHUB_OUTPUT \
            || echo "fingerprints_changed=true" >> $GITHUB_OUTPUT

      - name: Run merge script (preview)
        id: merge
        if: steps.diff.outputs.fingerprints_changed == 'true'
        run: |
          if [ -f "data/subscriptions_suggestions.json" ]; then
            python scripts/merge_suggestions.py > merge_output.txt 2>&1 || true
            cat merge_output.txt
            if [ -f "data/subscriptions_changeset.json" ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR branch and apply changes
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="chore/subscription-pricing-update-$DATE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH"
          
          # Apply changes
          python scripts/merge_suggestions.py --apply
          
          # Commit all changes
          git add data/
          git commit -m "chore: update subscription pricing [$DATE]

          Auto-generated from Gemini extraction.
          Review the changes before merging."
          
          git push origin "$BRANCH"
          
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.merge.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changeset = JSON.parse(fs.readFileSync('data/subscriptions_changeset.json', 'utf8'));
            
            let body = `## 🔄 Subscription Pricing Update\n\n`;
            body += `**Summary:**\n`;
            body += `- Providers changed: ${changeset.summary.providers_changed}\n`;
            body += `- Plans updated: ${changeset.summary.plans_updated}\n`;
            body += `- Plans added: ${changeset.summary.plans_added || 0}\n`;
            body += `- Significant price changes: ${changeset.summary.significant_price_changes}\n\n`;
            
            if (changeset.changes.length > 0) {
              body += `### Changes\n\n`;
              body += `| Provider | Plan | Field | Old | New | Change |\n`;
              body += `|----------|------|-------|-----|-----|--------|\n`;
              for (const c of changeset.changes.slice(0, 20)) {
                const pct = c.pct_change ? `${c.pct_change > 0 ? '+' : ''}${c.pct_change.toFixed(1)}%` : '-';
                body += `| ${c.provider} | ${c.plan || '-'} | ${c.field} | ${c.old ?? '-'} | ${c.new ?? '-'} | ${pct} |\n`;
              }
              if (changeset.changes.length > 20) {
                body += `\n_...and ${changeset.changes.length - 20} more changes_\n`;
              }
            }
            
            body += `\n---\n_Auto-generated by subscription pricing workflow. Please review before merging._`;
            
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Pricing Update] Subscription changes detected`,
              head: process.env.BRANCH || `chore/subscription-pricing-update-${new Date().toISOString().split('T')[0]}`,
              base: 'main',
              body,
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['subscription-change', 'auto-generated'],
            });

      - name: Commit fingerprints (no PR needed)
        if: steps.diff.outputs.fingerprints_changed == 'true' && steps.merge.outputs.has_changes != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/subscriptions_fingerprints.json
          git commit -m "chore: update subscription fingerprints [$(date -u +%Y-%m-%d)]" || true
          git push || true
